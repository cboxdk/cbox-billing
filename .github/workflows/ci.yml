name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, openssl, pdo_sqlite, bcmath
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan / Larastan, level max)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Tests (Pest)
        run: php artisan test

      - name: License check (permissive-only)
        run: composer license-check

      - name: Dependency audit
        run: composer audit --no-dev

      - name: SBOM (no drift)
        run: |
          composer sbom
          git diff --exit-code sbom.json
