name: Build Image

# Builds the open cbox-billing runtime image FROM the public cbox php-fpm-nginx base
# and pushes it to ghcr.io/cboxdk/cbox-billing. Runs on GitHub-hosted runners (this
# repo is public, so no self-hosted host access is exposed to it). No secrets: all
# deps are public and the push uses the built-in GITHUB_TOKEN. This is the image
# cbox-billing-cloud overlays FROM.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Guarded so it only runs for the canonical repo, and never for a fork's
    # pull_request (which would not have package:write anyway).
    if: github.repository == 'cboxdk/cbox-billing' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cboxdk/cbox-billing
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 only: GitHub-hosted runners are amd64 and QEMU-emulated arm64
          # builds blow the timeout. Re-enable once a native ARM runner exists.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cbox-billing
          cache-to: type=gha,mode=max,scope=cbox-billing
